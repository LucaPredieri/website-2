<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pictures — Luca Predieri</title>
    <meta name="description"
        content="A collection of photos by Luca Predieri — mountains, engineering, travels, and moments." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="gallery.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-brand">Luca Predieri</a>
            <div class="header-right">
                <nav class="site-nav">
                    <a href="about.html" class="nav-link">about</a>
                    <a href="pictures.html" class="nav-link active">moments</a>
                    <a href="blog.html" class="nav-link">blog</a>
                </nav>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content gallery-main">
        <div class="page-content">
            <header class="page-header">
                <h1>Pictures</h1>
                <p class="page-meta">Moments worth keeping.</p>
            </header>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">

                <button class="gallery-card" data-title="A Crisp October in Manarola"
                    data-desc="Taken on an October afternoon in Manarola. The light was incredible, casting a warm, golden glow that seemed to tan the colorful homes."
                    data-src="images/photo_manarola.jpg" aria-label="Open photo: A Crisp October in Manarola">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_manarola.jpg"
                            alt="Colorful houses of Manarola on a cliff side during golden hour" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="Gliding Through the Gili Islands"
                    data-desc="Captured one afternoon at the Gili Islands. It's one of my favorite shots; the turtle seems to be effortlessly gliding through the crystal-clear water."
                    data-src="images/photo_turtle.JPG" aria-label="Open photo: Gliding Through the Gili Islands">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_turtle.JPG"
                            alt="Sea turtle swimming underwater in clear blue water" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="The Majesty of the Arcipelago Toscano"
                    data-desc="The vast horizon of the Mediterranean sea, facing Isola del Giglio. This part of the Tuscan archipelago is one of my most cherished places."
                    data-src="images/photo_ocean.jpg" aria-label="Open photo: The Majesty of the Arcipelago Toscano">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_ocean.jpg"
                            alt="Wide view of the Mediterranean sea horizon from Isola del Giglio" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="Urban Melancholy"
                    data-desc="A rare shot featuring human subjects. In front of that stark phrase and the daily struggles they face, these figures simply couldn't be ignored."
                    data-src="images/photo_train.jpg" aria-label="Open photo: Urban Melancholy">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_train.jpg"
                            alt="Black and white photo of a train station with text on a wagon: 'WHEN SADNESS TURNS INTO PHYSICAL PAIN'"
                            loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="The Verticality of Dubai"
                    data-desc="A capture of the Burj Khalifa at night, representing its immense verticality and perhaps the quiet futility of such a grand scale."
                    data-src="images/photo_dubai.jpg" aria-label="Open photo: The Verticality of Dubai">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_dubai.jpg"
                            alt="Night view of the Burj Khalifa showing its extreme height" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="Nordic Sunlight in Trondheim"
                    data-desc="Taken in Trondheim, Norway. A memory of soaking up the rare Nordic sun on those piers with a friend."
                    data-src="images/photo_passerella.jpg" aria-label="Open photo: Nordic Sunlight in Trondheim">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_passerella.jpg"
                            alt="Wooden pier or walkway extending into the sea in Trondheim" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="Harmony in the Trøndelag Green"
                    data-desc="Captured in the middle of the Norwegian wild. It represents how human ingenuity can coexist in perfect harmony with the surrounding nature."
                    data-src="images/photo_cabin.jpg" aria-label="Open photo: Harmony in the Trøndelag Green">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_cabin.jpg"
                            alt="Modern wooden cabin surrounded by lush green trees in Norway" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="Light and Shadow at Scala dei Turchi"
                    data-desc="The white marl cliffs of Scala dei Turchi. The interaction of light and shadow creates an incredible, almost magical atmosphere in this unique landscape."
                    data-src="images/photo_scala.jpg" aria-label="Open photo: Light and Shadow at Scala dei Turchi">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_scala.jpg"
                            alt="White marl cliffs of Scala dei Turchi with high contrast shadows" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" data-title="Moody Peaks of Lofoten"
                    data-desc="A dramatic landscape from the Lofoten Islands. Sharp peaks, white sands, and the constant dance of clouds over the Norwegian Sea."
                    data-src="images/photo_lofoten.jpg" aria-label="Open photo: Moody Peaks of Lofoten">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_lofoten.jpg"
                            alt="Dramatic beach scene in Lofoten with a sharp mountain peak and moody clouds"
                            loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <!-- ===== LIGHTBOX MODAL ===== -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
        <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
        <div class="lightbox-inner">
            <div class="lightbox-img-wrap">
                <img src="" alt="" id="lightboxImg" class="lightbox-img" />
            </div>
            <div class="lightbox-info">
                <h2 class="lightbox-title" id="lightboxTitle"></h2>
                <p class="lightbox-desc" id="lightboxDesc"></p>
            </div>
        </div>
    </div>
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
        <p>© <span id="year"></span> Luca Predieri. Built with HTML, CSS &amp; ♥</p>
    </footer>

    <script src="main.js"></script>
    <script src="gallery.js"></script>
</body>

</html>
