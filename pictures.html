<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pictures — Luca Predieri</title>
    <meta name="description"
        content="A collection of photos by Luca Predieri — mountains, engineering, travels, and moments." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="gallery.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-brand">Luca Predieri</a>
            <div class="header-right">
                <nav class="site-nav">
                    <a href="about.html" class="nav-link">
                        <span class="lang-en">about</span>
                        <span class="lang-it">chi sono</span>
                    </a>
                    <a href="pictures.html" class="nav-link active">
                        <span class="lang-en">moments</span>
                        <span class="lang-it">attimi</span>
                    </a>
                    <a href="blog.html" class="nav-link">blog</a>
                </nav>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content gallery-main">
        <div class="page-content">
            <header class="page-header">
                <h1>
                    <span class="lang-en">Pictures</span>
                    <span class="lang-it">Foto</span>
                </h1>
                <p class="page-meta">
                    <span class="lang-en">Moments worth keeping.</span>
                    <span class="lang-it">Attimi che vale la pena conservare.</span>
                </p>
            </header>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">

                <button class="gallery-card" 
                    data-title-en="A Crisp October in Manarola"
                    data-title-it="Un Ottobre Fresco a Manarola"
                    data-desc-en="Taken on an October afternoon in Manarola. The light was incredible, casting a warm, golden glow that seemed to tan the colorful homes."
                    data-desc-it="Scattata in un pomeriggio di ottobre a Manarola. La luce era incredibile, proiettando un calore dorato che sembrava abbronzare le case colorate."
                    data-src="images/photo_manarola.jpg" aria-label="Open photo: A Crisp October in Manarola">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_manarola.jpg"
                            alt="Colorful houses of Manarola on a cliff side during golden hour" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="Gliding Through the Gili Islands"
                    data-title-it="Scivolando Tra le Isole Gili"
                    data-desc-en="Captured one afternoon at the Gili Islands. It's one of my favorite shots; the turtle seems to be effortlessly gliding through the crystal-clear water."
                    data-desc-it="Catturata un pomeriggio alle Isole Gili. È uno dei miei scatti preferiti; la tartaruga sembra scivolare senza sforzo attraverso l'acqua cristallina."
                    data-src="images/photo_turtle.JPG" aria-label="Open photo: Gliding Through the Gili Islands">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_turtle.JPG"
                            alt="Sea turtle swimming underwater in clear blue water" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="The Majesty of the Arcipelago Toscano"
                    data-title-it="La Maestosità dell'Arcipelago Toscano"
                    data-desc-en="The vast horizon of the Mediterranean sea, facing Isola del Giglio. This part of the Tuscan archipelago is one of my most cherished places."
                    data-desc-it="Il vasto orizzonte del Mar Mediterraneo, di fronte all'Isola del Giglio. Questa parte dell'arcipelago toscano è uno dei miei luoghi più cari."
                    data-src="images/photo_ocean.jpg" aria-label="Open photo: The Majesty of the Arcipelago Toscano">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_ocean.jpg"
                            alt="Wide view of the Mediterranean sea horizon from Isola del Giglio" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="Urban Melancholy"
                    data-title-it="Malinconia Urbana"
                    data-desc-en="A rare shot featuring human subjects. In front of that stark phrase and the daily struggles they face, these figures simply couldn't be ignored."
                    data-desc-it="Uno scatto raro con soggetti umani. Di fronte a quella frase cruda e alle lotte quotidiane che affrontano, queste figure semplicemente non potevano essere ignorate."
                    data-src="images/photo_train.jpg" aria-label="Open photo: Urban Melancholy">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_train.jpg"
                            alt="Black and white photo of a train station with text on a wagon: 'WHEN SADNESS TURNS INTO PHYSICAL PAIN'"
                            loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="The Verticality of Dubai"
                    data-title-it="La Verticalità di Dubai"
                    data-desc-en="A capture of the Burj Khalifa at night, representing its immense verticality and perhaps the quiet futility of such a grand scale."
                    data-desc-it="Uno scatto del Burj Khalifa di notte, che ne rappresenta l'immensa verticalità e forse la tranquilla futilità di una scala così grandiosa."
                    data-src="images/photo_dubai.jpg" aria-label="Open photo: The Verticality of Dubai">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_dubai.jpg"
                            alt="Night view of the Burj Khalifa showing its extreme height" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="Nordic Sunlight in Trondheim"
                    data-title-it="Luce Nordica a Trondheim"
                    data-desc-en="Taken in Trondheim, Norway. A memory of soaking up the rare Nordic sun on those piers with a friend."
                    data-desc-it="Scattata a Trondheim, Norvegia. Il ricordo di aver goduto del raro sole nordico su quei moli con un amico."
                    data-src="images/photo_passerella.jpg" aria-label="Open photo: Nordic Sunlight in Trondheim">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_passerella.jpg"
                            alt="Wooden pier or walkway extending into the sea in Trondheim" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="Harmony in the Trøndelag Green"
                    data-title-it="Armonia nel Verde del Trøndelag"
                    data-desc-en="Captured in the middle of the Norwegian wild. It represents how human ingenuity can coexist in perfect harmony with the surrounding nature."
                    data-desc-it="Catturata nel mezzo della natura selvaggia norvegese. Rappresenta come l'ingegno umano possa coesistere in perfetta armonia con la natura circostante."
                    data-src="images/photo_cabin.jpg" aria-label="Open photo: Harmony in the Trøndelag Green">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_cabin.jpg"
                            alt="Modern wooden cabin surrounded by lush green trees in Norway" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="Light and Shadow at Scala dei Turchi"
                    data-title-it="Luci e Ombre alla Scala dei Turchi"
                    data-desc-en="The white marl cliffs of Scala dei Turchi. The interaction of light and shadow creates an incredible, almost magical atmosphere in this unique landscape."
                    data-desc-it="Le scogliere di marna bianca della Scala dei Turchi. L'interazione di luci e ombre crea un'atmosfera incredibile, quasi magica, in questo paesaggio unico."
                    data-src="images/photo_scala.jpg" aria-label="Open photo: Light and Shadow at Scala dei Turchi">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_scala.jpg"
                            alt="White marl cliffs of Scala dei Turchi with high contrast shadows" loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>

                <button class="gallery-card" 
                    data-title-en="Moody Peaks of Lofoten"
                    data-title-it="Picchi Suggestivi delle Lofoten"
                    data-desc-en="A dramatic landscape from the Lofoten Islands. Sharp peaks, white sands, and the constant dance of clouds over the Norwegian Sea."
                    data-desc-it="Un paesaggio drammatico dalle isole Lofoten. Picchi affilati, sabbie bianche e la danza costante delle nuvole sul Mare di Norvegia."
                    data-src="images/photo_lofoten.jpg" aria-label="Open photo: Moody Peaks of Lofoten">
                    <div class="gallery-card-img-wrap">
                        <img src="images/thumbnails/photo_lofoten.jpg"
                            alt="Dramatic beach scene in Lofoten with a sharp mountain peak and moody clouds"
                            loading="lazy" />
                        <div class="gallery-card-overlay">
                            <span class="gallery-card-zoom">↗</span>
                        </div>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <!-- ===== LIGHTBOX MODAL ===== -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
        <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
        <div class="lightbox-inner">
            <div class="lightbox-img-wrap">
                <img src="" alt="" id="lightboxImg" class="lightbox-img" />
            </div>
            <div class="lightbox-info">
                <h2 class="lightbox-title" id="lightboxTitle"></h2>
                <p class="lightbox-desc" id="lightboxDesc"></p>
            </div>
        </div>
    </div>
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
        <div class="footer-inner">
            <p>© <span id="year"></span> Luca Predieri. Built with HTML, CSS &amp; ♥</p>
            <button class="lang-toggle" aria-label="Switch language" title="Switch language">
                <span class="lang-icon"></span>
            </button>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="gallery.js"></script>
</body>

</html>
