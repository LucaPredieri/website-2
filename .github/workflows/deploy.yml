name: Deploy with Private Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Images Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/website-images
          token: ${{ secrets.IMAGES_REPO_TOKEN }}
          path: temp_images

      - name: Sync Images
        run: |
          mkdir -p images
          if [ -d "temp_images/images" ]; then
            cp -rn temp_images/images/* images/
          else
            cp -rn temp_images/* images/ 2>/dev/null || true
          fi
          rm -rf temp_images
          rm .gitignore

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
