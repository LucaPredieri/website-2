name: Deploy with Private Images

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Images Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/website-images
          token: ${{ secrets.IMAGES_REPO_TOKEN }}
          path: temp_images

      - name: Sync Images
        run: |
          mkdir -p images
          if [ -d "temp_images/images" ]; then
            echo "Detected 'images' folder in private repo. Extracting contents..."
            cp -rn temp_images/images/* images/
          else
            echo "No 'images' folder detected. Copying files from root..."
            # Copy all files from root, excluding the temp_images directory itself
            cp -rn temp_images/* images/ 2>/dev/null || true
          fi
          echo "Final images directory structure:"
          ls -R images
          rm -rf temp_images

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
