name: Deploy with Private Images

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Images Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/website-images
          token: ${{ secrets.IMAGES_REPO_TOKEN }}
          path: temp_images

      - name: Sync Images
        run: |
          mkdir -p images
          cp -r temp_images/* images/
          rm -rf temp_images

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
